# Camera intrinsics  
  # 原始鱼眼（equidistant / fisheye）示例
  camera_model: "fisheye"
  fx: 1203.762044004368
  fy: 1203.7009720218682
  cx: 981.7904792654031
  cy: 525.2625697472332
  k1: -0.06940178268945467
  k2: -0.05259276838826166
  p1: 0
  p2: 0
  k3: 0.060392401913685174
